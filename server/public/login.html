<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>rclient Login</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="login-shell">
      <section class="login-card">
        <p class="eyebrow">rclient Control</p>
        <h1>Вход в панель</h1>
        <p class="lead">
          Панель управления клиентами закрыта паролем. После входа откроется доступ к
          командам, архиву и управлению устройствами.
        </p>
        <form id="login-form" class="command-form">
          <label>
            Пароль
            <input id="password" name="password" type="password" required />
          </label>
          <button type="submit">Войти</button>
        </form>
        <p id="login-status" class="status">Ожидание входа...</p>
      </section>
    </main>
    <script src="/login.js"></script>
  </body>
  </html>
